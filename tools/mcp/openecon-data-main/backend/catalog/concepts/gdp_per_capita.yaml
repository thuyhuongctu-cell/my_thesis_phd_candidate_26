# GDP per Capita Indicator Catalog
concept: gdp_per_capita
category: national_accounts
domain: macroeconomics

description: |
  Gross domestic product per person, expressed in current prices,
  constant prices, or purchasing power standards.

synonyms:
  primary:
    - gdp per capita
    - gdp per person
  secondary:
    - gdp per capita in pps
    - real gdp per capita
    - gross domestic product per capita
    - gdp per head
    - gdp per capita ppp
    - gdp per capita purchasing power parity

explicit_exclusions:
  - gdp growth
  - gdp level
  - total gdp

providers:
  WorldBank:
    primary:
      code: NY.GDP.PCAP.CD
      name: "GDP per capita (current US$)"
      confidence: 0.95
      coverage: global
      frequency: annual
    ppp:
      code: NY.GDP.PCAP.PP.CD
      name: "GDP per capita, PPP (current international $)"
      confidence: 0.95
      coverage: global
      frequency: annual
    ppp_constant:
      code: NY.GDP.PCAP.PP.KD
      name: "GDP per capita, PPP (constant 2021 international $)"
      confidence: 0.90
      coverage: global
      frequency: annual
    growth:
      code: NY.GDP.PCAP.KD.ZG
      name: "GDP per capita growth (annual %)"
      confidence: 0.90
      coverage: global
      frequency: annual

  Eurostat:
    primary:
      code: TEC00114
      name: "GDP per capita in PPS (index, EU27=100)"
      confidence: 0.80
      coverage: eu_members
      frequency: annual

not_available:
  - IMF
  - OECD
  - StatsCan
  - BIS
  - FRED
  - Comtrade
  - ExchangeRate
  - CoinGecko

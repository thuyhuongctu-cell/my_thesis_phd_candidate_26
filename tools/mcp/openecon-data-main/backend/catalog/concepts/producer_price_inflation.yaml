# Producer Price Inflation Indicator Catalog
concept: producer_price_inflation
category: prices
domain: macroeconomics

description: |
  Producer price inflation measures changes in prices received by domestic producers.
  It is commonly referred to as PPI inflation.

synonyms:
  primary:
    - producer price inflation
    - ppi inflation
    - producer prices
    - producer price index inflation
  secondary:
    - wholesale inflation
    - wholesale price inflation
    - ppi

explicit_exclusions:
  - consumer price inflation
  - cpi inflation
  - gdp deflator
  - import prices

providers:
  FRED:
    primary:
      code: PPIACO
      name: "Producer Price Index by Commodity: All Commodities"
      confidence: 0.95
      coverage: [US]
      frequency: monthly

  Eurostat:
    primary:
      code: STS_INPPD_A
      name: "Producer prices in industry, domestic market"
      confidence: 0.90
      coverage: eu_members
      frequency: annual

  WorldBank:
    primary:
      code: FP.WPI.TOTL.ZG
      name: "Inflation, wholesale prices (annual %)"
      confidence: 0.60
      coverage: partial_global
      frequency: annual

  OECD:
    # OECD uses dynamic SDMX DSD codes; PPI is a legacy code no longer in the DB.
    # DSD_STES@DF_INDSERV covers production, sales, work started and orders
    # (includes producer price indicators). Use DSD_PRICES@DF_PRICES_ALL as fallback.
    primary:
      code: DSD_STES@DF_INDSERV
      name: "Production, sales, work started and orders"
      confidence: 0.70
      coverage: oecd_members
      frequency: monthly

not_available:
  - Comtrade
  - CoinGecko
  - ExchangeRate

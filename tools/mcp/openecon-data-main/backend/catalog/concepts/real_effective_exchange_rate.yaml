# Real Effective Exchange Rate (REER) Catalog
concept: real_effective_exchange_rate
category: currency
domain: finance

description: |
  Real effective exchange rate (REER) is a trade-weighted index of a currency
  adjusted for relative price levels.

synonyms:
  primary:
    - real effective exchange rate
    - reer
    - effective exchange rate real
  secondary:
    - real broad effective exchange rate
    - trade weighted real exchange rate
    - real effective fx index

explicit_exclusions:
  - nominal effective exchange rate
  - bilateral exchange rate
  - currency conversion
  - spot exchange rate

providers:
  BIS:
    primary:
      code: WS_EER
      name: "Real effective exchange rate index (BIS WS_EER, dimension R=Real, B=Broad)"
      confidence: 0.95
      coverage: global
      frequency: monthly

  IMF:
    primary:
      code: EREER
      name: "Real Effective Exchange Rate"
      confidence: 0.88
      coverage: global
      frequency: annual

  WorldBank:
    primary:
      code: PX.REX.REER
      name: "Real effective exchange rate index (2010 = 100)"
      confidence: 0.85
      coverage: global
      frequency: annual

  OECD:
    primary:
      code: REER
      name: "Real effective exchange rates"
      confidence: 0.82
      coverage: oecd_members
      frequency: monthly

not_available:
  - Comtrade
  - CoinGecko
  - ExchangeRate

# .github/workflows/publish.yml
name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi         # must match PyPI trusted publisher env if you configure it that way
    permissions:
      id-token: write    # required for PyPI trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4  # official installer
        with:
          enable-cache: true

      - name: Build package
        run: |
          uv build

      # Optional: sanity check the built artifacts before publishing
      # e.g., install from dist/ and run smoke tests

      - name: Publish to PyPI
        run: |
          uv publish dist/*

name: PDF Download + Auto-Extract (P6)

on:
  workflow_dispatch:
    inputs:
      queue_file:
        description: 'Extraction queue CSV (in p6/tools/results/)'
        required: true
        default: 'extraction_queue_y_20260520.csv'
      limit:
        description: 'Max papers to attempt (0 = all REPO_URL+LOCAL_PDF papers)'
        required: false
        default: '0'
      run_extract:
        description: 'Run auto-extract after download? (true/false)'
        required: false
        default: 'true'

jobs:
  download-and-extract:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: claude/edit-vietnamese-academic-standards-xcAmn
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pdfplumber

      - name: Download PDFs from REPO_URL papers
        id: download
        continue-on-error: true
        run: |
          mkdir -p /tmp/p6_pdfs
          python3 p6/tools/48_download_repo_pdfs.py \
            --queue   "p6/tools/results/${{ github.event.inputs.queue_file }}" \
            --output-dir /tmp/p6_pdfs \
            --limit   "${{ github.event.inputs.limit }}"

      - name: Show download summary
        if: always()
        continue-on-error: true
        run: |
          LOG=$(ls p6/tools/results/download_log_repo_*.csv 2>/dev/null | sort | tail -1)
          echo "## PDF Download Results" >> $GITHUB_STEP_SUMMARY
          if [ -z "$LOG" ]; then
            echo "No download log found." >> $GITHUB_STEP_SUMMARY
          else
            python3 -c "
import csv
with open('${LOG}') as f:
    rows = list(csv.DictReader(f))
ok   = sum(1 for r in rows if r.get('status','') in ('OK','SKIP_EXISTS'))
fail = sum(1 for r in rows if r.get('status','') == 'FAIL')
skip = sum(1 for r in rows if r.get('status','') == 'SKIP_UNSUPPORTED')
print('| Metric | Count |')
print('|--------|-------|')
print('| OK / Skip-exists |', ok, '|')
print('| FAIL |', fail, '|')
print('| Unsupported |', skip, '|')
print('| Total |', len(rows), '|')
" >> $GITHUB_STEP_SUMMARY 2>&1 || echo "Could not parse log." >> $GITHUB_STEP_SUMMARY
            echo "Log: ${LOG}" >> $GITHUB_STEP_SUMMARY
          fi
          PDF_COUNT=$(ls /tmp/p6_pdfs/*.pdf 2>/dev/null | wc -l || echo 0)
          echo "PDFs downloaded: ${PDF_COUNT}" >> $GITHUB_STEP_SUMMARY

      - name: Run auto-extract from downloaded PDFs
        if: ${{ github.event.inputs.run_extract == 'true' }}
        continue-on-error: true
        run: |
          if [ -f "p6/tools/41_auto_extract_from_pdfs.py" ]; then
            python3 p6/tools/41_auto_extract_from_pdfs.py \
              --pdf-dir /tmp/p6_pdfs \
              --tracker "p6/tools/results/fulltext_to_extraction_tracker_v3.csv"
          else
            echo "41_auto_extract_from_pdfs.py not found — skipping"
          fi

      - name: Show extract summary
        if: always()
        continue-on-error: true
        run: |
          TRACKER="p6/tools/results/fulltext_to_extraction_tracker_v3.csv"
          echo "## Auto-Extract Results" >> $GITHUB_STEP_SUMMARY
          python3 -c "
import csv
with open('${TRACKER}') as f:
    rows = list(csv.DictReader(f))
y      = sum(1 for r in rows if r.get('fulltext_screening_decision','') == 'Y')
ready  = sum(1 for r in rows if r.get('ready_for_r','') == '1')
filled = sum(1 for r in rows if r.get('converted_r','').strip())
print('| Metric | Count |')
print('|--------|-------|')
print('| Y papers |', y, '|')
print('| ready_for_r=1 |', ready, '|')
print('| converted_r filled |', filled, '|')
" >> $GITHUB_STEP_SUMMARY 2>&1 || echo "Could not read tracker." >> $GITHUB_STEP_SUMMARY

      - name: Upload results as artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: p6-download-results-${{ github.run_number }}
          path: |
            p6/tools/results/download_log_repo_*.csv
            p6/tools/results/auto_extract_log_*.csv
          if-no-files-found: ignore
          retention-days: 30

      - name: Commit download log + tracker updates
        if: always()
        continue-on-error: true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin claude/edit-vietnamese-academic-standards-xcAmn 2>&1 || echo "Pull had issues, continuing..."
          git add p6/tools/results/download_log_repo_*.csv 2>/dev/null || true
          git add p6/tools/results/auto_extract_log_*.csv 2>/dev/null || true
          git add p6/tools/results/fulltext_to_extraction_tracker_v3.csv 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "feat(p6): PDF download + auto-extract results [$(date +%Y%m%d)]"
            git push origin claude/edit-vietnamese-academic-standards-xcAmn 2>&1 \
              || echo "Push failed — results available as workflow artifacts."
          fi

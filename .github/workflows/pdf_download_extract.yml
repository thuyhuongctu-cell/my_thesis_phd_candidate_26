name: PDF Download + Auto-Extract (P6)

on:
  workflow_dispatch:
    inputs:
      queue_file:
        description: 'Extraction queue CSV (in p6/tools/results/)'
        required: true
        default: 'extraction_queue_y_20260520.csv'
      limit:
        description: 'Max papers to attempt (0 = all REPO_URL+LOCAL_PDF papers)'
        required: false
        default: '0'
      run_extract:
        description: 'Run auto-extract after download? (true/false)'
        required: false
        default: 'true'

jobs:
  download-and-extract:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pdfplumber

      - name: Download PDFs from REPO_URL papers
        id: download
        continue-on-error: true
        run: |
          mkdir -p /tmp/p6_pdfs
          python3 p6/tools/48_download_repo_pdfs.py \
            --queue   "p6/tools/results/${{ github.event.inputs.queue_file }}" \
            --output-dir /tmp/p6_pdfs \
            --limit   "${{ github.event.inputs.limit }}"

      - name: Show download summary
        if: always()
        continue-on-error: true
        run: |
          echo "## PDF Download Results" >> $GITHUB_STEP_SUMMARY
          LOG=$(ls p6/tools/results/download_log_repo_*.csv 2>/dev/null | sort | tail -1)
          if [ -z "$LOG" ]; then
            echo "No download log found." >> $GITHUB_STEP_SUMMARY
          else
            python3 -c "import csv; rows=list(csv.DictReader(open('${LOG}'))); ok=sum(1 for r in rows if r.get('status','') in ('OK','SKIP_EXISTS')); fail=sum(1 for r in rows if r.get('status','')=='FAIL'); skip=sum(1 for r in rows if r.get('status','')=='SKIP_UNSUPPORTED'); print('| Metric | Count |'); print('|--------|-------|'); print('| OK / Skip-exists |',ok,'|'); print('| FAIL |',fail,'|'); print('| Unsupported |',skip,'|'); print('| Total |',len(rows),'|')" >> $GITHUB_STEP_SUMMARY 2>&1 || echo "Could not parse log." >> $GITHUB_STEP_SUMMARY
            echo "Log: ${LOG}" >> $GITHUB_STEP_SUMMARY
          fi
          PDF_COUNT=$(find /tmp/p6_pdfs -name '*.pdf' 2>/dev/null | wc -l)
          echo "PDFs in /tmp/p6_pdfs: ${PDF_COUNT}" >> $GITHUB_STEP_SUMMARY

      - name: Run auto-extract from downloaded PDFs
        if: ${{ github.event.inputs.run_extract == 'true' }}
        continue-on-error: true
        run: |
          if [ -f "p6/tools/41_auto_extract_from_pdfs.py" ]; then
            python3 p6/tools/41_auto_extract_from_pdfs.py \
              --pdf-dir /tmp/p6_pdfs \
              --tracker "p6/tools/results/fulltext_to_extraction_tracker_v3.csv"
          else
            echo "41_auto_extract_from_pdfs.py not found — skipping"
          fi

      - name: Fill ICRV gaps in tracker (abstract-based)
        if: ${{ github.event.inputs.run_extract == 'true' }}
        continue-on-error: true
        run: |
          if [ -f "p6/tools/47_auto_code_icrv.py" ]; then
            python3 p6/tools/47_auto_code_icrv.py
          else
            echo "47_auto_code_icrv.py not found — skipping"
          fi

      - name: Show extract summary
        if: always()
        continue-on-error: true
        run: |
          echo "## Auto-Extract Results" >> $GITHUB_STEP_SUMMARY
          TRACKER="p6/tools/results/fulltext_to_extraction_tracker_v3.csv"
          if [ -f "$TRACKER" ]; then
            python3 -c "import csv; rows=list(csv.DictReader(open('p6/tools/results/fulltext_to_extraction_tracker_v3.csv'))); y=sum(1 for r in rows if r.get('fulltext_screening_decision','')=='Y'); ready=sum(1 for r in rows if r.get('ready_for_r','')=='1'); filled=sum(1 for r in rows if r.get('converted_r','').strip()); print('| Metric | Count |'); print('|--------|-------|'); print('| Y papers |',y,'|'); print('| ready_for_r=1 |',ready,'|'); print('| converted_r filled |',filled,'|')" >> $GITHUB_STEP_SUMMARY 2>&1 || echo "Could not read tracker." >> $GITHUB_STEP_SUMMARY
          else
            echo "Tracker not found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload results as artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: p6-download-results-${{ github.run_number }}
          path: |
            p6/tools/results/download_log_repo_*.csv
            p6/tools/results/auto_extract_log_*.csv
            p6/tools/results/icrv_auto_log_*.csv
          if-no-files-found: ignore
          retention-days: 30

      - name: Commit download log + tracker updates
        if: always()
        continue-on-error: true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.ref_name }} 2>&1 || echo "Pull had issues, continuing..."
          git add p6/tools/results/download_log_repo_*.csv 2>/dev/null || true
          git add p6/tools/results/auto_extract_log_*.csv 2>/dev/null || true
          git add p6/tools/results/icrv_auto_log_*.csv 2>/dev/null || true
          git add p6/tools/results/fulltext_to_extraction_tracker_v3.csv 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "feat(p6): PDF download + auto-extract + ICRV/DPL fill [$(date +%Y%m%d)]"
            git push origin ${{ github.ref_name }} 2>&1 \
              || echo "Push failed — results available as workflow artifacts."
          fi

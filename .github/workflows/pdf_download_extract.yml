name: PDF Download + Auto-Extract (P6)

on:
  workflow_dispatch:
    inputs:
      queue_file:
        description: 'Extraction queue CSV (in p6/tools/results/)'
        required: true
        default: 'extraction_queue_y_20260520.csv'
      limit:
        description: 'Max papers to attempt (0 = all REPO_URL papers)'
        required: false
        default: '0'
      run_extract:
        description: 'Run auto-extract after download? (true/false)'
        required: false
        default: 'true'

jobs:
  download-and-extract:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: claude/edit-vietnamese-academic-standards-xcAmn
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pdfplumber

      - name: Download PDFs from REPO_URL papers
        id: download
        run: |
          mkdir -p /tmp/p6_pdfs
          python3 p6/tools/48_download_repo_pdfs.py \
            --queue   "p6/tools/results/${{ github.event.inputs.queue_file }}" \
            --output-dir /tmp/p6_pdfs \
            --limit   "${{ github.event.inputs.limit }}"

      - name: Show download summary
        if: always()
        run: |
          LOG=$(ls p6/tools/results/download_log_repo_*.csv 2>/dev/null | sort | tail -1)
          echo "## PDF Download Results" >> $GITHUB_STEP_SUMMARY
          if [ -z "$LOG" ]; then
            echo "No download log found." >> $GITHUB_STEP_SUMMARY
          else
            OK=$(python3 -c "
          import csv
          with open('$LOG') as f:
              rows = list(csv.DictReader(f))
          ok = sum(1 for r in rows if r.get('status','') in ('OK','SKIP_EXISTS'))
          fail = sum(1 for r in rows if r.get('status','') == 'FAIL')
          skip = sum(1 for r in rows if r.get('status','') == 'SKIP_UNSUPPORTED')
          print(f'OK/Skip-exists: {ok} | FAIL: {fail} | Unsupported: {skip} | Total: {len(rows)}')
          ")
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| $OK |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Log file: \`$LOG\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "PDFs in /tmp/p6_pdfs: $(ls /tmp/p6_pdfs/*.pdf 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY

      - name: Run auto-extract from downloaded PDFs
        if: ${{ github.event.inputs.run_extract == 'true' }}
        run: |
          if [ -f "p6/tools/41_auto_extract_from_pdfs.py" ]; then
            python3 p6/tools/41_auto_extract_from_pdfs.py \
              --pdf-dir /tmp/p6_pdfs \
              --tracker "p6/tools/results/fulltext_to_extraction_tracker_v3.csv"
          else
            echo "41_auto_extract_from_pdfs.py not found — skipping extract step"
          fi

      - name: Show extract summary
        if: ${{ github.event.inputs.run_extract == 'true' && always() }}
        run: |
          TRACKER="p6/tools/results/fulltext_to_extraction_tracker_v3.csv"
          echo "## Auto-Extract Results" >> $GITHUB_STEP_SUMMARY
          if [ -f "$TRACKER" ]; then
            python3 -c "
          import csv
          with open('$TRACKER') as f:
              rows = list(csv.DictReader(f))
          ready = sum(1 for r in rows if r.get('ready_for_r','') == '1')
          y = sum(1 for r in rows if r.get('fulltext_screening_decision','') == 'Y')
          filled_r = sum(1 for r in rows if r.get('converted_r','').strip())
          print(f'Y papers: {y}')
          print(f'ready_for_r=1: {ready}')
          print(f'converted_r filled: {filled_r}')
          " >> $GITHUB_STEP_SUMMARY 2>&1 || echo "Could not read tracker." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit download log + tracker updates
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin claude/edit-vietnamese-academic-standards-xcAmn || true
          git add p6/tools/results/download_log_repo_*.csv || true
          git add p6/tools/results/fulltext_to_extraction_tracker_v3.csv || true
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "feat(p6): PDF download + auto-extract results [$(date +%Y%m%d)]"
          git push origin claude/edit-vietnamese-academic-standards-xcAmn

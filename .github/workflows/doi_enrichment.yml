name: DOI Enrichment - CrossRef API (P6)

on:
  workflow_dispatch:
    inputs:
      input_file:
        description: 'Input CSV (in p6/tools/results/)'
        required: false
        default: 'new_candidates_20260520.csv'
      output_file:
        description: 'Output CSV (in p6/tools/results/)'
        required: false
        default: 'new_candidates_20260520_doi_enriched.csv'
      max_records:
        description: 'Max records to enrich (0 = all)'
        required: false
        default: '0'

jobs:
  enrich-doi:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: claude/edit-vietnamese-academic-standards-xcAmn
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run CrossRef DOI enrichment
        env:
          INPUT_FILE: ${{ github.event.inputs.input_file }}
          OUTPUT_FILE: ${{ github.event.inputs.output_file }}
          MAX_RECORDS: ${{ github.event.inputs.max_records }}
        run: |
          python3 p6/tools/07_enrich_doi_crossref.py \
            --input  "p6/tools/results/${INPUT_FILE}" \
            --output "p6/tools/results/${OUTPUT_FILE}" \
            --email  huongp1323001@gstudent.ctu.edu.vn \
            --max    "${MAX_RECORDS:-0}"

      - name: Show summary
        env:
          OUTPUT_FILE: ${{ github.event.inputs.output_file }}
        run: |
          OUTPATH="p6/tools/results/${OUTPUT_FILE}"
          TOTAL=$(tail -n +2 "$OUTPATH" | wc -l)
          ENRICHED=$(tail -n +2 "$OUTPATH" | awk -F',' 'NF>1 && $NF!="" {count++} END {print count+0}')
          echo "Total records : ${TOTAL}"
          echo "Enriched      : ${ENRICHED}"

      - name: Commit and push results
        env:
          OUTPUT_FILE: ${{ github.event.inputs.output_file }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "p6/tools/results/${OUTPUT_FILE}"
          git diff --staged --quiet || \
            git commit -m "data(p6): CrossRef DOI enrichment $(date +%Y-%m-%d)"
          git push origin HEAD:claude/edit-vietnamese-academic-standards-xcAmn

name: M-AIDA CI

# Tests the backend (effect-size conversions + confidence scheme) on changes.
#
# NOTE: a frontend production-build job is intentionally omitted. The UI is a
# Create-React-App project (react-scripts 5) whose toolchain does not support
# the pinned React 19 / TypeScript versions (ajv + peer-dependency conflicts);
# building it requires migrating off the deprecated react-scripts to Vite. The
# scientifically meaningful, copyright-relevant logic lives in the backend and
# is fully covered here. Re-add a frontend job after the Vite migration.
on:
  push:
    paths:
      - "p6/tools/maida/backend/**"
      - ".github/workflows/maida-ci.yml"
  pull_request:
    paths:
      - "p6/tools/maida/backend/**"
      - ".github/workflows/maida-ci.yml"
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend — pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: p6/tools/maida/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install backend (with test extras)
        run: pip install -e ".[test]"
      - name: Run unit tests
        run: pytest -q

name: M-AIDA CI

# Lint/test the backend and verify the frontend builds, on changes to the tool.
on:
  push:
    paths:
      - "p6/tools/maida/**"
      - ".github/workflows/maida-ci.yml"
  pull_request:
    paths:
      - "p6/tools/maida/**"
      - ".github/workflows/maida-ci.yml"
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend — pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: p6/tools/maida/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install backend (with test extras)
        run: pip install -e ".[test]"
      - name: Run unit tests
        run: pytest -q

  frontend-build:
    name: Frontend — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: p6/tools/maida/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: p6/tools/maida/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          # Do not fail the production build on lint warnings.
          CI: "false"

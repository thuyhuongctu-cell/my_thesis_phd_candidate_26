name: Scopus API Search — P6 Meta-analysis

on:
  workflow_dispatch:        # manual trigger from GitHub Actions tab
    inputs:
      max_records:
        description: 'Max records to retrieve (default: 5000)'
        required: false
        default: '5000'

jobs:
  scopus-search:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # allow committing results back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: claude/edit-vietnamese-academic-standards-xcAmn
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scopus API search
        env:
          SCOPUS_API_KEY: ${{ secrets.SCOPUS_API_KEY }}
        run: |
          python3 p6/tools/05_scopus_api_search.py \
            --max ${{ github.event.inputs.max_records || '5000' }} \
            --output p6/tools/results/scopus_api_$(date +%Y%m%d).csv

      - name: Show summary
        run: |
          echo "=== Scopus Results ==="
          ls -lh p6/tools/results/scopus_api_*.csv 2>/dev/null || echo "No output file"
          wc -l p6/tools/results/scopus_api_*.csv 2>/dev/null || true
          head -3 p6/tools/results/scopus_api_*.csv 2>/dev/null || true

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add p6/tools/results/scopus_api_*.csv
          git diff --staged --quiet || git commit -m "data(p6): add Scopus API search results $(date +%Y-%m-%d)"
          git push origin HEAD:claude/edit-vietnamese-academic-standards-xcAmn

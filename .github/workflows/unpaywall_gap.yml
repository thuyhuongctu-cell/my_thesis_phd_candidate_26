name: Unpaywall Gap Fill (P6)

on:
  workflow_dispatch:
    inputs:
      gap_file:
        description: 'Gap queue CSV (papers missing from existing manifest)'
        required: true
        default: 'extraction_queue_gap_doi_20260522.csv'
      output_file:
        description: 'Output manifest CSV filename (in p6/tools/results/)'
        required: true
        default: 'oa_manifest_gap_20260522.csv'
      delay:
        description: 'Delay between requests (seconds)'
        required: false
        default: '0.15'

jobs:
  unpaywall-gap:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: claude/edit-vietnamese-academic-standards-xcAmn
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Query Unpaywall for gap papers
        run: |
          python3 p6/tools/39_query_unpaywall.py \
            --input  "p6/tools/results/${{ github.event.inputs.gap_file }}" \
            --output "p6/tools/results/${{ github.event.inputs.output_file }}" \
            --priority "1_DOI_FIRST" \
            --delay  "${{ github.event.inputs.delay }}"

      - name: Merge gap manifest into latest full manifest
        run: |
          GAP="p6/tools/results/${{ github.event.inputs.output_file }}"
          if [ -f "$GAP" ]; then
            python3 p6/tools/58_merge_oa_manifests.py \
              --out p6/tools/results/oa_manifest_merged.csv
            echo "Merged. Rows in oa_manifest_merged.csv:"
            tail -n +2 p6/tools/results/oa_manifest_merged.csv | wc -l
          else
            echo "Gap manifest not found at $GAP — skipping merge"
          fi

      - name: Show summary
        run: |
          echo "## Unpaywall Gap Fill Results" >> $GITHUB_STEP_SUMMARY
          GAP="p6/tools/results/${{ github.event.inputs.output_file }}"
          if [ -f "$GAP" ]; then
            python3 -c "
          import csv
          rows = list(csv.DictReader(open('$GAP')))
          oa  = sum(1 for r in rows if r.get('is_oa','') in ('True','true'))
          pdf = sum(1 for r in rows if r.get('pdf_url','').strip())
          err = sum(1 for r in rows if r.get('error','').strip())
          print('| Metric | Count |')
          print('|--------|-------|')
          print(f'| Gap papers queried | {len(rows)} |')
          print(f'| OA available | {oa} |')
          print(f'| PDF URLs found | {pdf} |')
          print(f'| Errors | {err} |')
          " >> $GITHUB_STEP_SUMMARY 2>&1 || true
          fi

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "p6/tools/results/${{ github.event.inputs.output_file }}" || true
          git add p6/tools/results/oa_manifest_merged.csv || true
          git diff --cached --quiet && echo "Nothing to commit." || \
            git commit -m "feat(p6): Unpaywall gap manifest — ${{ github.event.inputs.gap_file }} [$(date +%Y%m%d)]"
          git push origin claude/edit-vietnamese-academic-standards-xcAmn

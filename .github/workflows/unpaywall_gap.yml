name: Unpaywall Gap Fill (P6)

on:
  workflow_dispatch:
    inputs:
      gap_file:
        description: 'Gap queue CSV (papers missing from existing manifest)'
        required: true
        default: 'extraction_queue_gap_doi_20260522.csv'
      output_file:
        description: 'Output manifest CSV filename (in p6/tools/results/)'
        required: true
        default: 'oa_manifest_gap_20260522.csv'
      delay:
        description: 'Delay between requests (seconds)'
        required: false
        default: '0.15'

jobs:
  unpaywall-gap:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    # Pass dispatch inputs through env (never interpolate ${{ inputs }} directly
    # into a run: script — GitHub expands it before the shell, enabling command
    # injection). Reference them only as quoted "$VARS" below.
    env:
      GAP_FILE: ${{ github.event.inputs.gap_file }}
      OUTPUT_FILE: ${{ github.event.inputs.output_file }}
      DELAY: ${{ github.event.inputs.delay }}

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: claude/edit-vietnamese-academic-standards-xcAmn
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Validate inputs
        run: |
          # Filenames only (no path separators, no parent escapes); numeric delay.
          for f in "$GAP_FILE" "$OUTPUT_FILE"; do
            case "$f" in
              */*|*..*) echo "Filename input must not contain a path, got: $f"; exit 1 ;;
            esac
          done
          case "$DELAY" in
            ''|*[!0-9.]*) echo "delay must be numeric, got: $DELAY"; exit 1 ;;
          esac

      - name: Verify inputs and environment
        run: |
          echo "=== Environment check ==="
          echo "Gap input file : p6/tools/results/$GAP_FILE"
          echo "Output file    : p6/tools/results/$OUTPUT_FILE"
          echo "Delay          : $DELAY"
          echo ""
          echo "=== Input file check ==="
          ls -lh "p6/tools/results/$GAP_FILE" || {
            echo "ERROR: Gap input file not found!"
            ls p6/tools/results/ | head -20
            exit 1
          }
          echo "Input rows: $(tail -n +2 "p6/tools/results/$GAP_FILE" | wc -l)"
          echo ""
          echo "=== Existing OA manifests ==="
          ls p6/tools/results/oa_manifest_*.csv 2>/dev/null || echo "(none found)"
          echo ""
          echo "=== Python / requests ==="
          python3 --version
          python3 -c "import requests; print('requests OK')"

      - name: Query Unpaywall for gap papers
        run: |
          echo "=== Querying Unpaywall ==="
          python3 p6/tools/39_query_unpaywall.py \
            --input  "p6/tools/results/$GAP_FILE" \
            --output "p6/tools/results/$OUTPUT_FILE" \
            --priority "1_DOI_FIRST" \
            --delay  "$DELAY"
          echo ""
          echo "=== Output file ==="
          ls -lh "p6/tools/results/$OUTPUT_FILE" || echo "WARNING: output file not created"
          ROWS=$(tail -n +2 "p6/tools/results/$OUTPUT_FILE" 2>/dev/null | wc -l || echo 0)
          echo "Rows written: $ROWS"

      - name: Merge gap manifest into full manifest
        run: |
          GAP="p6/tools/results/$OUTPUT_FILE"
          if [ -f "$GAP" ]; then
            echo "=== Merging manifests ==="
            ls p6/tools/results/oa_manifest_*.csv 2>/dev/null || echo "(no existing manifests)"
            python3 p6/tools/58_merge_oa_manifests.py \
              --out p6/tools/results/oa_manifest_merged.csv || {
              echo "WARNING: merge failed (exit $?) -- continuing without merge"
            }
            if [ -f p6/tools/results/oa_manifest_merged.csv ]; then
              echo "Rows in oa_manifest_merged.csv: $(tail -n +2 p6/tools/results/oa_manifest_merged.csv | wc -l)"
            fi
          else
            echo "Gap manifest not found -- skipping merge"
          fi

      - name: Show summary (robust CSV parse)
        run: |
          # Use Python csv to count correctly — awk -F',' miscounts because
          # title/journal fields contain commas, which shifts columns.
          python3 - "p6/tools/results/$OUTPUT_FILE" <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import csv, sys
          path = sys.argv[1]
          try:
              rows = list(csv.DictReader(open(path, encoding="utf-8")))
          except FileNotFoundError:
              print("## Unpaywall Gap Fill Results\n\n**Output file not found:**", path); raise SystemExit(0)
          truthy = lambda v: str(v).strip().lower() in ("true", "1", "yes")
          oa  = sum(1 for r in rows if truthy(r.get("is_oa", "")))
          pdf = sum(1 for r in rows if (r.get("pdf_url") or "").strip())
          print("## Unpaywall Gap Fill Results\n")
          print("| Metric | Count |")
          print("|--------|-------|")
          print(f"| Gap papers queried | {len(rows)} |")
          print(f"| OA available | {oa} |")
          print(f"| PDF URLs found | {pdf} |")
          PY

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Remote: $(git remote get-url origin 2>/dev/null || echo unknown)"
          git add "p6/tools/results/$OUTPUT_FILE" || true
          git add p6/tools/results/oa_manifest_merged.csv || true
          git status --short
          git diff --cached --quiet && echo "Nothing to commit." || \
            git commit -m "feat(p6): Unpaywall gap fill - $GAP_FILE [$(date +%Y%m%d)]"
          git push origin claude/edit-vietnamese-academic-standards-xcAmn || {
            echo "Push failed (exit $?). Trying with --force-with-lease..."
            git push --force-with-lease origin claude/edit-vietnamese-academic-standards-xcAmn || \
              echo "Force push also failed. Check branch protection rules."
          }

name: P6 Full Search — WoS + Scopus + OpenAlex

on:
  workflow_dispatch:
    inputs:
      wos_api_key:
        description: 'WoS Starter API Key (optional — leave blank to use secrets.WOS_API_KEY)'
        required: false
        default: ''
      scopus_api_key:
        description: 'Scopus API Key (optional — leave blank to use secrets.SCOPUS_API_KEY)'
        required: false
        default: ''
      openalex_api_key:
        description: 'OpenAlex API Key (optional — leave blank to use secrets.OPENALEX_API_KEY)'
        required: false
        default: ''
      max_wos:
        description: 'Max WoS records'
        required: false
        default: '2500'
      max_scopus:
        description: 'Max Scopus records'
        required: false
        default: '5000'
      max_openalex:
        description: 'Max OpenAlex records'
        required: false
        default: '5000'

jobs:
  full-search:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: claude/edit-vietnamese-academic-standards-xcAmn
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      # ── Validate at least one API key is available for each provider ─────
      - name: Validate API keys available
        env:
          WOS_INPUT: ${{ github.event.inputs.wos_api_key }}
          WOS_SECRET: ${{ secrets.WOS_API_KEY }}
          SCOPUS_INPUT: ${{ github.event.inputs.scopus_api_key }}
          SCOPUS_SECRET: ${{ secrets.SCOPUS_API_KEY }}
          OPENALEX_INPUT: ${{ github.event.inputs.openalex_api_key }}
          OPENALEX_SECRET: ${{ secrets.OPENALEX_API_KEY }}
        run: |
          MISSING=()
          [[ -z "$WOS_INPUT" && -z "$WOS_SECRET" ]] && MISSING+=("WOS_API_KEY")
          [[ -z "$SCOPUS_INPUT" && -z "$SCOPUS_SECRET" ]] && MISSING+=("SCOPUS_API_KEY")
          # OpenAlex works without a key (rate-limited), so we only warn.
          if [[ -z "$OPENALEX_INPUT" && -z "$OPENALEX_SECRET" ]]; then
            echo "::warning::OpenAlex API key not set — running anonymously (lower rate limit)."
          fi
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Missing API keys: ${MISSING[*]}. Set them in repo Settings → Secrets and variables → Actions, or pass via workflow_dispatch inputs."
            exit 1
          fi

      # ── Connectivity diagnostics ─────────────────────────────────────────
      - name: Test API connectivity
        env:
          WOS_API_KEY: ${{ github.event.inputs.wos_api_key || secrets.WOS_API_KEY }}
          SCOPUS_API_KEY: ${{ github.event.inputs.scopus_api_key || secrets.SCOPUS_API_KEY }}
        run: |
          echo "=== Connectivity Test ==="
          echo "Runner IP: $(curl -s https://ifconfig.me || echo unknown)"
          echo ""

          WOS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            -H "X-ApiKey: $WOS_API_KEY" \
            "https://api.clarivate.com/apis/wos-starter/v1/documents?db=WOS&q=TS%3Dinternationalization&limit=1" || echo "ERR")
          echo "WoS API status:     $WOS_STATUS"

          SCOPUS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            -H "X-ELS-APIKey: $SCOPUS_API_KEY" \
            "https://api.elsevier.com/content/search/scopus?query=internationalization&count=1" || echo "ERR")
          echo "Scopus API status:  $SCOPUS_STATUS"

          OA_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            "https://api.openalex.org/works?search=internationalization&per_page=1" || echo "ERR")
          echo "OpenAlex status:    $OA_STATUS"

          echo "WOS_HTTP=$WOS_STATUS"     >> $GITHUB_ENV
          echo "SCOPUS_HTTP=$SCOPUS_STATUS" >> $GITHUB_ENV
          echo "OA_HTTP=$OA_STATUS"       >> $GITHUB_ENV

      # ── 1. WoS ──────────────────────────────────────────────────────────
      - name: Run WoS Starter API search
        env:
          WOS_API_KEY: ${{ github.event.inputs.wos_api_key || secrets.WOS_API_KEY }}
        run: |
          if [ "$WOS_HTTP" != "200" ]; then
            echo "WoS API not reachable from GitHub Actions (HTTP $WOS_HTTP) — skipping"
          else
            python3 p6/tools/06_wos_api_search.py \
              --max ${{ github.event.inputs.max_wos }} \
              --output p6/tools/results/wos_api_$(date +%Y%m%d).csv
            echo "WoS done: $(tail -n +2 p6/tools/results/wos_api_$(date +%Y%m%d).csv | wc -l) records"
          fi
        continue-on-error: true

      # ── 2. Scopus ────────────────────────────────────────────────────────
      - name: Run Scopus API search
        env:
          SCOPUS_API_KEY: ${{ github.event.inputs.scopus_api_key || secrets.SCOPUS_API_KEY }}
        run: |
          if [ "$SCOPUS_HTTP" != "200" ]; then
            echo "Scopus API not reachable from GitHub Actions (HTTP $SCOPUS_HTTP) — skipping"
          else
            python3 p6/tools/05_scopus_api_search.py \
              --max ${{ github.event.inputs.max_scopus }} \
              --output p6/tools/results/scopus_api_$(date +%Y%m%d).csv
            echo "Scopus done: $(tail -n +2 p6/tools/results/scopus_api_$(date +%Y%m%d).csv | wc -l) records"
          fi
        continue-on-error: true

      # ── 3. OpenAlex ──────────────────────────────────────────────────────
      - name: Run OpenAlex search
        env:
          OPENALEX_API_KEY: ${{ github.event.inputs.openalex_api_key || secrets.OPENALEX_API_KEY }}
          MAX_OA: ${{ github.event.inputs.max_openalex }}
        run: |
          if [ "$OA_HTTP" != "200" ]; then
            echo "OpenAlex not reachable (HTTP $OA_HTTP) — skipping"
            exit 0
          fi
          python3 - <<'PYEOF'
          import requests, csv, time, os
          from datetime import date
          from pathlib import Path

          API_KEY = os.environ.get("OPENALEX_API_KEY", "")
          TODAY   = date.today().strftime("%Y%m%d")
          OUT     = Path("p6/tools/results") / f"openalex_api_{TODAY}.csv"
          MAX     = int(os.environ.get("MAX_OA", "5000"))

          QUERIES = [
              "internationalization firm performance",
              "internationalisation firm performance",
              "export intensity labor productivity firm",
              "foreign sales total sales financial performance",
              "multinationality degree internationalization performance",
              "FSTS FATA firm performance",
          ]

          headers = {"User-Agent": "mailto:Thuyhuongctu@gmail.com"}
          if API_KEY:
              headers["Authorization"] = f"Bearer {API_KEY}"

          seen, rows = set(), []
          fieldnames = ["source","source_id","authors","year","title","journal","doi","abstract"]

          for q in QUERIES:
              if len(rows) >= MAX:
                  break
              page, per_page = 1, 200
              while len(rows) < MAX:
                  params = {
                      "search": q,
                      "filter": "publication_year:1977-2026,type:article",
                      "per_page": per_page,
                      "page": page,
                      "select": "id,doi,title,publication_year,primary_location,authorships,abstract_inverted_index",
                  }
                  try:
                      r = requests.get("https://api.openalex.org/works",
                                       params=params, headers=headers, timeout=30)
                      r.raise_for_status()
                      data = r.json()
                  except Exception as e:
                      print(f"Error q={q!r[:40]} page={page}: {e}")
                      break

                  hits = data.get("results", [])
                  if not hits:
                      break

                  for w in hits:
                      oid = w.get("id", "")
                      if oid in seen:
                          continue
                      seen.add(oid)
                      doi = (w.get("doi") or "").replace("https://doi.org/", "")
                      auths = "; ".join(
                          a.get("author", {}).get("display_name", "")
                          for a in (w.get("authorships") or [])[:5]
                      )
                      loc = (w.get("primary_location") or {})
                      journal = (loc.get("source") or {}).get("display_name", "")
                      inv = w.get("abstract_inverted_index") or {}
                      abstract = ""
                      if inv:
                          words = sorted((pos, word)
                                         for word, positions in inv.items()
                                         for pos in positions)
                          abstract = " ".join(w for _, w in words)[:500]
                      rows.append({
                          "source": "openalex",
                          "source_id": oid,
                          "authors": auths,
                          "year": w.get("publication_year", ""),
                          "title": w.get("title", ""),
                          "journal": journal,
                          "doi": doi,
                          "abstract": abstract,
                      })

                  total = data.get("meta", {}).get("count", 0)
                  print(f"  q={q[:40]!r} page={page} got={len(hits)} total={total} unique={len(seen)}")
                  if page * per_page >= total:
                      break
                  page += 1
                  time.sleep(0.12)

          with open(OUT, "w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=fieldnames)
              writer.writeheader()
              writer.writerows(rows)
          print(f"\nOpenAlex done: {len(rows)} unique records -> {OUT}")
          PYEOF
        continue-on-error: true

      # ── Summary ──────────────────────────────────────────────────────────
      - name: Print summary
        run: |
          echo "========= SEARCH SUMMARY $(date +%Y-%m-%d) ========="
          echo "  WoS=$WOS_HTTP  Scopus=$SCOPUS_HTTP  OpenAlex=$OA_HTTP"
          TODAY=$(date +%Y%m%d)
          TOTAL=0
          for f in p6/tools/results/wos_api_${TODAY}.csv \
                   p6/tools/results/scopus_api_${TODAY}.csv \
                   p6/tools/results/openalex_api_${TODAY}.csv; do
            if [ -f "$f" ]; then
              N=$(tail -n +2 "$f" | wc -l)
              TOTAL=$((TOTAL + N))
              echo "  OK  $(basename $f): $N records"
            else
              echo "  --  $(basename $f): not produced"
            fi
          done
          echo "  TOTAL: $TOTAL new records"
          echo "=========================================="

      # ── Commit ───────────────────────────────────────────────────────────
      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          find p6/tools/results/ \( -name "wos_api_*.csv" -o \
               -name "scopus_api_*.csv" -o \
               -name "openalex_api_*.csv" \) | xargs git add 2>/dev/null || true
          git diff --staged --quiet && echo "Nothing new to commit" || \
            git commit -m "data(p6): search results $(date +%Y-%m-%d) [WoS:$WOS_HTTP Scopus:$SCOPUS_HTTP OA:$OA_HTTP]"
          git push origin HEAD:claude/edit-vietnamese-academic-standards-xcAmn

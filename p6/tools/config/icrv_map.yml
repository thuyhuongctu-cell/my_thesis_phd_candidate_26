# ICRV Regime Classification Map
# Single source of truth for country → ICRV code mapping
# Used by: 47_auto_code_icrv.py, 49_fill_icrv_dpl_gaps.py, 55_extract_structured.py
#
# ICRV codes:
#   1 = Advanced (high-income OECD)
#   2 = Upper-middle / Emerging-advanced
#   3 = Emerging / Developing
#   4 = Resource-rich / GCC
#   5 = SIDS (Small Island Developing States)
#   6 = Frontier / LDC
#   0 = Multi-country (mixed sample; default to 2 if dominant context is emerging)
#
# ICRV TP gradient: TP DECREASES as institutional quality INCREASES
#   Group 1 (Advanced) ≈ 28% LOWEST turning point
#   Group 6 (Frontier) ≈ 55% HIGHEST turning point


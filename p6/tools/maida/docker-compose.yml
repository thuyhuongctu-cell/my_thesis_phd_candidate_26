version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8765:8765"
    env_file: ./backend/.env
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8765
    depends_on:
      - backend
